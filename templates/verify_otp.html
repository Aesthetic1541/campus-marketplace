<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Email Verification | CampusMart</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.verify-card{
    background:white;
    padding:40px;
    border-radius:12px;
    width:380px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.verify-card h2{
    margin-bottom:10px;
    color:#0f172a;
}

.verify-card p{
    color:#555;
    font-size:14px;
    margin-bottom:25px;
}

.otp-input{
    width:100%;
    padding:14px;
    font-size:18px;
    text-align:center;
    border-radius:8px;
    border:1px solid #ddd;
    outline:none;
    letter-spacing:4px;
    margin-bottom:20px;
}

.otp-input:focus{
    border-color:#2563eb;
}

.verify-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.verify-btn:hover{
    background:#1d4ed8;
}

.resend{
    margin-top:15px;
    font-size:13px;
}

.resend a{
    color:#2563eb;
    text-decoration:none;
}

.resend-btn{
margin-top:10px;
background:none;
border:none;
color:#2563eb;
cursor:pointer;
font-size:13px;
}

.flash{
    background:#fee2e2;
    color:#b91c1c;
    padding:10px;
    border-radius:6px;
    margin-bottom:15px;
    font-size:14px;
}

</style>
</head>

<body>

<div class="verify-card">

<h2>Email Verification</h2>

<p>Enter the OTP sent to your email</p>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="flash">
    {{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<form method="POST">

<input
type="text"
name="otp"
class="otp-input"
placeholder="Enter 6-digit OTP"
required
maxlength="6"
>

<button class="verify-btn">
Verify OTP
</button>

</form>

<div class="resend">

<form action="{{ url_for('resend_otp') }}" method="GET">

<button type="submit" class="resend-btn">
Resend OTP
</button>

</form>
</div>

</div>

</body>
</html>
