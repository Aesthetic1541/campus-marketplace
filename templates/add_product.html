{% extends "base.html" %}

{% block title %}Add Product | CampusMart{% endblock %}

{% block content %}

<div class="form-wrapper">

    <div class="form-card">

        <h2>Add New Product</h2>
        <p class="form-subtitle">List your item for fellow students</p>

        <form method="POST" action="/add-product" enctype="multipart/form-data">

            <label>Product Title</label>
            <input type="text" name="title" placeholder="Enter product name" required>

            <label>Category</label>
            <select name="category" required>
                <option value="">Select Category</option>
                <option value="Books">Books</option>
                <option value="Electronics">Electronics</option>
                <option value="Instruments">Instruments</option>
                <option value="Other">Other</option>
            </select>

            <label>Condition</label>
            <select name="condition" required>
                <option value="">Select Condition</option>
                <option value="New">New</option>
                <option value="Second Hand">Second Hand</option>
                <option value="Refurbished">Refurbished</option>
            </select>

            <label>Description</label>
            <textarea name="description" rows="4" placeholder="Add product description..." required></textarea>

            <label>Price (₹)</label>
            <input type="number" name="price" min="0" step="0.01" placeholder="Enter price" required>

            <label>Product Image</label>
            <input type="file" name="image" accept="image/*">

            <button type="submit" class="submit-btn">
                Submit Product
            </button>

        </form>

    </div>

</div>

{% endblock %}
